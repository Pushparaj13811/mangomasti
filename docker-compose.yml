services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mangomasti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-mangomasti}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mangomasti}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mangomasti}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mangomasti}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mangomasti}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mangomasti}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
